services:
  postgres:
    image: postgres:16
    container_name: promopilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: promopilot
      POSTGRES_PASSWORD: promopilot
      POSTGRES_DB: promopilot360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: promopilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  wppconnect:
    image: wppconnect/server-cli:latest
    container_name: promopilot_wppconnect
    restart: unless-stopped
    ports:
      - "21465:21465"
    volumes:
      - wppconnect_tokens:/usr/src/wpp-server/tokens

volumes:
  postgres_data:
  wppconnect_tokens:
