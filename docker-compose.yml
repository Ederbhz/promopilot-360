services:
  postgres:
    image: postgres:16
    container_name: promopilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: promopilot
      POSTGRES_PASSWORD: promopilot
      POSTGRES_DB: promopilot360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: promopilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
