services:
  workspace:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-20-bookworm
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    environment:
      APP_NAME: PromoPilot 360
      APP_ENV: development
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PORT: 4000
      JWT_SECRET: dev_only_change_this_secret
      ENCRYPTION_KEY: dev_only_change_this_encryption_key
      DATABASE_URL: postgresql://promopilot:promopilot@postgres:5432/promopilot360
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEFAULT_ADMIN_EMAIL: admin@promopilot.local
      DEFAULT_ADMIN_PASSWORD: promopilot123
