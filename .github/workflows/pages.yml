name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          pnpm build:packages
          pnpm --filter @promopilot/web build
          touch apps/web/out/.nojekyll

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd apps/web/out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy frontend ${GITHUB_SHA}"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

      - name: Configure Pages source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          payload='{"source":{"branch":"gh-pages","path":"/"}}'
          status=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d "${payload}")

          if [ "${status}" = "404" ]; then
            status=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d "${payload}")
          fi

          cat /tmp/pages-response.json
          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "::warning::Nao foi possivel trocar a fonte do GitHub Pages automaticamente. Configure Pages para usar branch gh-pages / root."
          fi
